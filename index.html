<!DOCTYPE html>
<html>
<head>
<title>For My Gudiya ❤️</title>

<style>

body{
background:black;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
padding:20px;
}

.box{
max-width:900px;
margin:auto;
border:2px solid #00ffcc;
border-radius:20px;
padding:20px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

input{
padding:12px;
width:250px;
border-radius:10px;
border:none;
text-align:center;
}

#step2{
display:none;
}

#final{
display:none;
}

img{
width:100%;
max-width:900px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="box">

<!-- STEP 1 -->

<div id="step1">

<h2>🔒 DEVICE SECURITY CHECK</h2>

<p>Enter your phone lock password</p>

<input
type="password"
placeholder="Enter Password">

<br><br>

<button onclick="nextStep()">
OK
</button>

</div>

<!-- STEP 2 -->

<div id="step2">

<h2>❤️ Who is Hrishi? ❤️</h2>

<br>

<button onclick="openFinal()">
Best Friend 😊
</button>

<br><br>

<button onclick="openFinal()">
Half BF 😘
</button>

<br><br>

<button onclick="openFinal()">
BF ❤️
</button>

</div>

<!-- FINAL PAGE -->

<div id="final">

<audio id="bgmusic" loop>
<source src="Jaadui.mp3" type="audio/mpeg">
</audio>

<h1>For My Gudiya ❤️</h1>

<img src="IMG_2263.png">

<br><br>

<h2>Will You Be My Girlfriend? ❤️</h2>

<button onclick="yesClicked()">
YES ❤️
</button>

<button onclick="noClicked()">
NO 💔
</button>

</div>

</div>

<script>

function nextStep(){

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

}

function openFinal(){

document.getElementById("step2").style.display="none";
document.getElementById("final").style.display="block";

var music=document.getElementById("bgmusic");

music.play().catch(()=>{});

}

function yesClicked(){

alert(
"Hrishi Says ❤️\n\nThank You Gudiya ❤️\n\nThank you for giving us another chance 🌹"
);

}

function noClicked(){

let first=confirm(
"Are you sure? 🥺"
);

if(first){

let second=confirm(
"Really sure? ❤️"
);

if(second){

alert(
"Hrishi Says ❤️\n\nI will try in a different way ❤️\n\nBecause some people are worth waiting for... 🌹"
);

}

}

}

</script>

</body>
</html>
